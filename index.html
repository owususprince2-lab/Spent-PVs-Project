    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      const group1Questions = [
        {
          id: 1,
          question: "In the study by Jiajia Tian et al. (2023), what HNO₃ concentration was identified as optimal for silver recovery, and what was the reported recovery rate?",

        },
        {
          id: 2,
          question: "Which lixiviant system achieved greater than 85% silver recovery at room temperature without any acid heating requirement?",

        },
        {
          id: 3,
          question: "Kastanaki et al. (2023) achieved 100% silver leaching using nitric acid. What were the precise conditions reported?",

          correctAnswer: 1,
          explanation: "Kastanaki et al. (2023) used 1–2 N HNO₃ under hydrothermal conditions to achieve 100%. Option D uses hydrothermal conditions but the wrong concentration (0.5 M belongs to Mwase et al., 2024). Reference: Eleni Kastanaki et al., 2023."
        },
        {
          id: 4,
          question: "The highest silver recovery percentage reported across all reviewed studies was 99.98%. Which study achieved this, and with what lixiviant?",

            "Eleni Kastanaki et al., 2023 — 1–2 N HNO₃ hydrothermal",

        },
        {
          id: 5,
          question: "In the context of spent PV module processing, hydrochloric acid (5% HCl) was used by Mwase et al. (2024). What was its primary function?",

        {
          id: 7,
          question: "Among the organic acid lixiviants tested by Kastanaki et al. (2025), which acid proved more effective, and at what concentration?",

          explanation: "HNO₃ shows limitations at both ends: low temperatures (25–45°C) give poor Al leaching, and even 80°C achieves only 76% at 5 N due to Al-Si alloy formation. HCl's temperature issue is about co-leaching quality, not Al extraction efficiency. Reference: Eleni Kastanaki et al., 2023."
        },
        {
          id: 15,
          question: "The span of studies reviewed for aluminum leaching covers which time period, and how many independent studies are cited?",
          options: [
            "2020–2024; five independent studies",
            "2014–2024; four independent studies",
            "2014–2025; four independent studies",
            "2020–2024; four independent studies"
          ],
          correctAnswer: 1,
          explanation: "The findings state 'four independent studies (2014–2024).' Yi et al. (2014) is the earliest, and Li et al. (2024) is the most recent. Option D omits 2014, and Option C extends the range to 2025 which is not stated. Reference: Consolidated findings."
        },
        {
          id: 16,
          question: "Which acid is described as dominating the aluminum leaching literature with the widest tested concentration range?",
          options: [
            "HCl — tested from 1% to 10%",
            "H₂SO₄ — tested from 0.2 M to 12 M",
            "HNO₃ — tested from 1 to 4 M across studies",
            "NaOH — used as both a primary and secondary lixiviant"
          ],
          correctAnswer: 2,
          explanation: "The findings explicitly state 'HNO₃ being the most frequently studied at varying concentrations (1–4 M).' H₂SO₄'s 12 M figure is a single data point for selectivity, not a range across studies. NaOH is alkaline and secondary. Reference: Consolidated findings."
        },
        {
          id: 17,
          question: "A student claims that HCl is the ideal lixiviant for aluminum removal because it achieves 99% extraction at room temperature. What finding best challenges this claim?",
          options: [
            "HCl requires 50°C to achieve 99% Al extraction",
            "HCl co-leaches ~70 ppm Pb and ~20 ppm Ag, requiring additional purification",
            "HCl was only tested in one study and lacks sufficient evidence",
            "HCl requires sequential NaOH treatment to achieve 99% efficiency"
          ],
          correctAnswer: 1,
          explanation: "The co-leaching of Pb (~70 ppm) and Ag (~20 ppm) is the primary limitation of HCl — it achieves the extraction goal but introduces impurities. Option A is false (room temperature is the reported condition). Option D applies to HNO₃ (Chen et al., 2020), not HCl. Reference: J. Mwase et al., 2024."
        },
        {
          id: 18,
          question: "Among all limitations identified, which finding most directly demonstrates that a single-acid approach is fundamentally insufficient for complete aluminum extraction?",
          options: [
            "H₂SO₄ requires 12 M for effective leaching, making it hazardous",
            "HCl at 50°C worsens Pb co-leaching",
            "HNO₃ at 5 N, 80°C still only achieved 76% Al leaching despite aggressive conditions",
            "HNO₃ at 4 M required NaOH post-treatment to reach 99.9% efficiency"
          ],
          correctAnswer: 3,
          explanation: "Chen et al. (2020) most directly proves single-acid insufficiency: 4 M HNO₃ alone could not achieve complete Al extraction and required 3 M NaOH afterward to reach 99.9%. Option C shows incomplete leaching but doesn't necessitate a second step as a proven solution. Reference: Wei-Sheng Chen et al., 2020."
        },
        {
          id: 19,
          question: "Which two lixiviant systems are described as having been studied across the widest range of conditions (temperature, concentration, and sequential steps) for aluminum leaching?",
          options: [
            "HCl and H₂O₂-H₂SO₄",
            "H₂O₂-H₂SO₄ and NaOH",
            "HNO₃ and NaOH (as part of sequential treatment)",
            "HCl and NaOH"
          ],
          correctAnswer: 2,
          explanation: "HNO₃ appears at 1–2 N hydrothermal (Kastanaki), 4 M in sequence with 3 M NaOH (Chen), and 5 N at 80°C (Kastanaki). NaOH appears as both a sequential partner and in the Yi et al. process. Together they cover the widest range of conditions tested. Reference: Eleni Kastanaki et al., 2023; Wei-Sheng Chen et al., 2020; Y. K. Yi et al., 2014."
        },
        {
          id: 20,
          question: "Based on all findings, which statement most accurately characterizes the current state of aluminum leaching from spent PVs?",
          options: [
            "All tested lixiviants achieve >99% Al extraction without co-leaching issues",
            "Acidic lixiviants dominate and consistently achieve >99% Al extraction, but co-leaching, temperature dependence, and incomplete single-step recovery remain key limitations",
            "Alkaline lixiviants outperform acidic ones in both efficiency and selectivity",
            "The evidence base is too limited (fewer than 3 studies) to draw conclusions about limitations"
          ],
          correctAnswer: 1,
          explanation: "This directly reflects the findings: acidic systems dominate and achieve high efficiencies, but the identified limitations (co-leaching of Pb/Ag in HCl, Al-Si alloy formation in HNO₃, high concentration needs for H₂SO₄, and sequential requirements) are real and consistent. Reference: Consolidated findings, 2014–2024."
        }
      ];

      const GROUP_TOPICS = {
        1: "Silver Leaching",
        2: "Cu/Pb/Sn Recovery",
        3: "Aluminium Leaching"
      };

      const ALL_QUESTIONS = {
        1: group1Questions,
        2: group2Questions,
        3: group3Questions
      };

      function QuizApp() {
        const [view, setView] = useState("start");
        const [studentName, setStudentName] = useState("");
        const [indexNumber, setIndexNumber] = useState("");
        const [selectedGroup, setSelectedGroup] = useState(null);
        const [currentQ, setCurrentQ] = useState(0);
        const [answers, setAnswers] = useState({});
        const [timeLeft, setTimeLeft] = useState(TIME_PER_QUESTION);
        const [tabSwitches, setTabSwitches] = useState(0);
        const [revealed, setRevealed] = useState(false);
        const [quizSubmitted, setQuizSubmitted] = useState(false);
        const [adminPassword, setAdminPassword] = useState("");
        const [showAdminLogin, setShowAdminLogin] = useState(false);
        const [finalResults, setFinalResults] = useState(null);
        const timerRef = useRef(null);

        const questions = selectedGroup ? ALL_QUESTIONS[selectedGroup] : group1Questions;

        // Anti-cheat
        useEffect(() => {
          if (view !== "quiz") return;
          const noCtx = e => e.preventDefault();
          const noCopy = e => e.preventDefault();
          document.addEventListener("contextmenu", noCtx);
          document.addEventListener("copy", noCopy);
          document.addEventListener("cut", noCopy);
          document.addEventListener("paste", noCopy);
          document.body.style.userSelect = "none";
          const onVis = () => { if (document.hidden) setTabSwitches(p => p + 1); };
          document.addEventListener("visibilitychange", onVis);
          return () => {
            document.removeEventListener("contextmenu", noCtx);
            document.removeEventListener("copy", noCopy);
            document.removeEventListener("cut", noCopy);
            document.removeEventListener("paste", noCopy);
            document.removeEventListener("visibilitychange", onVis);
            document.body.style.userSelect = "auto";
          };
        }, [view]);

        // Timer
        useEffect(() => {
          if (view !== "quiz" || revealed) return;
          if (timeLeft <= 0) {
            setRevealed(true);
            return;
          }
          timerRef.current = setTimeout(() => setTimeLeft(p => p - 1), 1000);
          return () => clearTimeout(timerRef.current);
        }, [view, timeLeft, revealed]);

        const handleStartQuiz = async () => {
          if (!studentName.trim() || !indexNumber.trim()) { alert("Please enter your name and index number"); return; }
          if (!selectedGroup) { alert("Please select your group"); return; }
          const btn = document.getElementById("startBtn");
          if (btn) btn.disabled = true;
          try {
            const resp = await fetch(`${GOOGLE_SCRIPT_URL}?sheet=Sheet1`);
            const data = await resp.json();
            const already = data.some(r => String(r.indexNumber).trim() === String(indexNumber).trim());
            if (already) {
              alert("This index number has already been used. You cannot retake the quiz.");
              if (btn) btn.disabled = false;
              return;
            }
            setView("quiz");
            setTimeLeft(TIME_PER_QUESTION);
            setRevealed(false);
          } catch {
            alert("Error checking records. Please try again.");
            if (btn) btn.disabled = false;
          }
        };

        // Allow changing answer while time is running
        const handleAnswer = (optIdx) => {
          if (revealed) return;
          setAnswers(p => ({ ...p, [currentQ]: optIdx }));
        };

        const handleNext = () => {
          if (currentQ < questions.length - 1) {
            setCurrentQ(p => p + 1);
            setTimeLeft(TIME_PER_QUESTION);
            setRevealed(false);
          } else {
            submitQuiz();
          }
        };

        const submitQuiz = async () => {
          if (quizSubmitted) return;
          setQuizSubmitted(true);
          let correct = 0;
          questions.forEach((q, i) => {
            if (answers[i] === q.correctAnswer) correct++;
          });
          const tabPenalty = tabSwitches * TAB_SWITCH_PENALTY;
          const finalScore = Math.max(0, correct - tabPenalty);
          const pct = ((finalScore / questions.length) * 100).toFixed(1);
          const result = {
            studentName, indexNumber,
            group: `Group ${selectedGroup} (${GROUP_TOPICS[selectedGroup]})`,
            rawScore: correct,
            tabSwitches, tabPenalty, finalScore,
            totalQuestions: questions.length,
            percentage: pct,
            timestamp: new Date().toLocaleString()
          };
          setFinalResults(result);
          setView("result");
          try {
            await fetch(GOOGLE_SCRIPT_URL, {
              method: "POST", mode: "no-cors",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(result)
            });
          } catch {}
        };

        const handleAdminLogin = () => {
          if (adminPassword === ADMIN_PASSWORD) setView("admin");
          else alert("Incorrect password");
        };

        if (view === "admin") return <AdminView onExit={() => setView("start")} />;

        if (view === "start") return (
          <div className="app-wrap">
            <div style={{ width: "100%", maxWidth: 520 }}>
              <div className="card">
                <div style={{ marginBottom: "0.5rem" }}><span className="badge">KNUST · Materials Engineering</span></div>
                <h1 style={{ marginBottom: "0.25rem" }}>Spent <span>PVs</span> Project</h1>
                <p className="subtitle mono" style={{ fontSize: "0.78rem", color: "var(--accent)", letterSpacing: "0.06em", marginBottom: "1.5rem" }}>PHOTOVOLTAIC RECYCLING QUIZ — 20 QUESTIONS</p>

                <div className="rules-box">
                  <strong>Quiz Rules</strong><br />
                  · 20 questions · <strong>30 seconds</strong> per question<br />
                  · You may change your answer anytime before time runs out<br />
                  · Timer stops → answer revealed → click Next<br />
                  · Points only awarded within the 30-second window<br />
                  · Tab switching: <strong>–0.5 pts</strong> each · Right-click disabled<br />
                  · Each group has its own unique question set
                </div>

                <label className="field-label">Select Your Group</label>
                <div className="group-select-grid">
                  {[1,2,3].map(g => (
                    <button key={g} className={`group-btn ${selectedGroup === g ? "selected" : ""}`} onClick={() => setSelectedGroup(g)}>
                      <span className="g-num">{g}</span>
                      <span className="g-label">Group {g}</span>
                      <span className="g-topic">{GROUP_TOPICS[g]}</span>
                    </button>
                  ))}
                </div>

                <label className="field-label">Full Name</label>
                <input type="text" value={studentName} onChange={e => setStudentName(e.target.value)} placeholder="Enter your full name" />

                <label className="field-label">Index Number</label>
                <input type="text" value={indexNumber} onChange={e => setIndexNumber(e.target.value)} placeholder="Enter your index number" />

                <button id="startBtn" className="btn-primary" onClick={handleStartQuiz}>BEGIN QUIZ →</button>

                <button className="btn-secondary" onClick={() => setShowAdminLogin(!showAdminLogin)}>
                  {showAdminLogin ? "Hide Admin Login" : "Admin Login"}
                </button>

                {showAdminLogin && (
                  <div style={{ marginTop: "0.75rem", background: "var(--surface2)", border: "1px solid var(--border)", borderRadius: 10, padding: "1rem" }}>
                    <input type="password" value={adminPassword} onChange={e => setAdminPassword(e.target.value)} placeholder="Admin Password" style={{ marginBottom: "0.75rem" }} />
                    <button className="btn-primary" onClick={handleAdminLogin} style={{ background: "var(--surface2)", color: "var(--text-muted)", border: "1px solid var(--border)" }}>Login as Admin</button>
                  </div>
                )}
              </div>
              <div className="footer">©Team Benny</div>
            </div>
          </div>
        );

        if (view === "result" && finalResults) {
          const { rawScore, tabSwitches: ts, tabPenalty, finalScore, percentage } = finalResults;
          const grade = finalScore >= 16 ? "A" : finalScore >= 14 ? "B" : finalScore >= 10 ? "C" : "D";
          return (
            <div className="app-wrap">
              <div className="card" style={{ maxWidth: 520, textAlign: "center" }}>
                <div style={{ marginBottom: "1rem" }}><span className="badge badge-green">✓ SUBMITTED</span></div>
                <h1>Quiz Complete!</h1>
                <p className="subtitle">Well done, {studentName}</p>
                <div className="score-big">{finalScore}<span style={{ fontSize: "1.5rem", color: "var(--text-muted)" }}>/{questions.length}</span></div>
                <p style={{ color: "var(--accent2)", fontSize: "0.85rem", marginBottom: "1.25rem", fontFamily: "Space Mono" }}>{percentage}% · Grade {grade}</p>
                <div className="score-detail">
                  <div className="score-item"><div className="si-label">Raw Score</div><div className="si-val">{rawScore}</div></div>
                  <div className="score-item"><div className="si-label">Tab Switches</div><div className="si-val" style={{ color: ts > 0 ? "var(--danger)" : "var(--text)" }}>{ts}</div></div>
                  <div className="score-item"><div className="si-label">Penalty</div><div className="si-val" style={{ color: "var(--danger)" }}>–{tabPenalty}</div></div>
                  <div className="score-item"><div className="si-label">Group</div><div className="si-val" style={{ fontSize: "1.1rem" }}>Grp {selectedGroup}</div></div>
                </div>
                <p style={{ color: "var(--text-muted)", fontSize: "0.82rem" }}>Your results have been recorded. Your instructor will share final grades.</p>
              </div>
              <div className="footer">©Team Benny</div>
            </div>
          );
        }

        const q = questions[currentQ];
        const userAnswer = answers[currentQ];
        const progress = ((currentQ) / questions.length) * 100;

        return (
          <div className="app-wrap" style={{ alignItems: "flex-start", paddingTop: "1.5rem" }}>
            <div style={{ width: "100%", maxWidth: 680 }}>
              <div className="quiz-header">
                <div style={{ display: "flex", alignItems: "center", gap: "0.75rem", flexWrap: "wrap" }}>
                  <span style={{ fontWeight: 600, fontSize: "0.9rem" }}>{studentName}</span>
                  <span className="badge">{indexNumber}</span>
                  <span className="badge badge-green">Group {selectedGroup} · {GROUP_TOPICS[selectedGroup]}</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: "1rem" }}>
                  {tabSwitches > 0 && (
                    <div className="tab-warning">⚠ {tabSwitches} switch{tabSwitches > 1 ? "es" : ""} (–{(tabSwitches * TAB_SWITCH_PENALTY).toFixed(1)})</div>
                  )}
                  <div className="timer-wrap">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" style={{ color: timeLeft <= 8 ? "var(--danger)" : "var(--accent2)", flexShrink: 0 }}>
                      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                    </svg>
                    <span className={`timer-num ${timeLeft <= 8 ? "warning pulse" : "ok"}`}>{timeLeft}s</span>
                  </div>
                </div>
              </div>

              <div className="progress-bar-wrap">
                <div className="progress-bar-fill" style={{ width: `${progress}%` }} />
              </div>

              <div className="card" style={{ maxWidth: "100%", padding: "2rem" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1.25rem" }}>
                  <span className="badge" style={{ background: "rgba(62,207,142,0.1)", color: "var(--accent2)", borderColor: "rgba(62,207,142,0.3)" }}>Q {currentQ + 1} of {questions.length}</span>
                  {revealed && <span className="badge badge-red">TIME UP</span>}
                </div>

                <p className="question-text">{q.question}</p>

                <div>
                  {q.options.map((opt, i) => {
                    let cls = "option-btn";
                    if (revealed) {
                      if (i === q.correctAnswer) cls += " correct";
                      else if (userAnswer === i && i !== q.correctAnswer) cls += " wrong";
                    } else {
                      if (userAnswer === i) cls += " selected";
                    }
                    return (
                      <button key={i} className={cls} disabled={revealed} onClick={() => handleAnswer(i)}>
                        <span className="option-letter">{LETTERS[i]}</span>
                        <span>{opt}</span>
                      </button>
                    );
                  })}
                </div>

                {!revealed && userAnswer !== undefined && (
                  <p className="change-hint">💡 You can change your answer — timer is still running</p>
                )}

                {revealed && (
                  <div className="explanation-box">
                    <div className="exp-title">✓ Explanation</div>
                    <div style={{ color: "var(--text)", marginTop: "0.25rem" }}>{q.explanation}</div>
                  </div>
                )}

                {revealed && (
                  <button className={`next-btn${currentQ === questions.length - 1 ? " submit" : ""}`} onClick={handleNext}>
                    {currentQ === questions.length - 1 ? "Submit Quiz ✓" : "Next Question →"}
                  </button>
                )}
              </div>

              <div className="footer" style={{ marginTop: "1rem" }}>©Team Benny</div>
            </div>
          </div>
        );
      }

      function AdminView({ onExit }) {
        const [results, setResults] = useState([]);
        const [loading, setLoading] = useState(true);

        useEffect(() => { load(); }, []);

        const load = async () => {
          setLoading(true);
          try {
            const resp = await fetch(`${GOOGLE_SCRIPT_URL}?sheet=Sheet1`);
            const data = await resp.json();
            setResults(data);
          } catch {}
          setLoading(false);
        };

        const stats = (() => {
          if (!results.length) return { highest: 0, average: 0, lowest: 0 };
          const scores = results.map(r => parseFloat(String(r.finalScore).split("/")[0]));
          return {
            highest: Math.max(...scores),
            lowest: Math.min(...scores),
            average: (scores.reduce((a,b) => a+b, 0) / scores.length).toFixed(1)
          };
        })();

        return (
          <div style={{ minHeight: "100vh", padding: "1.5rem", background: "var(--bg)" }}>
            <div style={{ maxWidth: 1100, margin: "0 auto" }}>
              <div className="card card-wide">
                <div className="header-bar">
                  <div>
                    <h1 style={{ fontSize: "1.4rem", marginBottom: "0.25rem" }}>Admin <span>Dashboard</span></h1>
                    <p className="text-muted text-sm mono">Spent PVs Project Quiz · Sheet1</p>
                  </div>
                  <div style={{ display: "flex", gap: "0.5rem" }}>
                    <button className="btn-sm accent" onClick={load}>↻ Refresh</button>
                    <button className="btn-sm" onClick={onExit}>Exit Admin</button>
                  </div>
                </div>

                {loading ? (
                  <p className="text-muted">Loading from Google Sheets...</p>
                ) : results.length === 0 ? (
                  <p className="text-muted">No submissions yet.</p>
                ) : (
                  <>
                    <div className="stat-grid">
                      <div className="stat-card"><div className="sc-label">Total Submissions</div><div className="sc-val">{results.length}</div></div>
                      <div className="stat-card" style={{ borderColor: "rgba(34,197,94,0.3)" }}><div className="sc-label" style={{ color: "var(--correct)" }}>Highest</div><div className="sc-val" style={{ color: "var(--correct)" }}>{stats.highest}/20</div></div>
                      <div className="stat-card"><div className="sc-label" style={{ color: "var(--accent2)" }}>Average</div><div className="sc-val" style={{ color: "var(--accent2)" }}>{stats.average}/20</div></div>
                      <div className="stat-card" style={{ borderColor: "rgba(239,68,68,0.3)" }}><div className="sc-label" style={{ color: "var(--danger)" }}>Lowest</div><div className="sc-val" style={{ color: "var(--danger)" }}>{stats.lowest}/20</div></div>
                    </div>
                    <p className="text-muted text-sm mb1">Each tab switch = –0.5 point penalty · 30 seconds per question</p>
                    <div className="overflow-x">
                      <table className="admin-table">
                        <thead>
                          <tr><th>#</th><th>Name</th><th>Index</th><th>Group</th><th>Raw</th><th>Switches</th><th>Penalty</th><th>Final</th><th>%</th><th>Time</th></tr>
                        </thead>
                        <tbody>
                          {results.map((r, i) => (
                            <tr key={i}>
                              <td style={{ color: "var(--text-muted)" }}>{i+1}</td>
                              <td style={{ fontWeight: 600 }}>{r.studentName}</td>
                              <td className="mono" style={{ fontSize: "0.82rem" }}>{r.indexNumber}</td>
                              <td><span className="badge badge-green">{r.group}</span></td>
                              <td style={{ fontWeight: 700 }}>{r.rawScore}</td>
                              <td>{r.tabSwitches}</td>
                              <td style={{ color: "var(--danger)" }}>–{r.tabPenalty}</td>
                              <td><span style={{ color: "var(--accent)", fontWeight: 700, fontFamily: "Space Mono" }}>{r.finalScore}</span></td>
                              <td><span className="badge">{r.percentage}%</span></td>
                              <td style={{ color: "var(--text-muted)", fontSize: "0.75rem" }}>{r.timestamp}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </>
                )}
              </div>
              <div className="footer mt1">©Team Benny</div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<QuizApp />);
    </script>
  </body>
</html>
